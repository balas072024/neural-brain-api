<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Brain - AI Processing Backend</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2333;--border:#30363d;
  --text:#e6edf3;--text-dim:#8b949e;--accent:#58a6ff;--accent2:#7c3aed;
  --green:#3fb950;--red:#f85149;--orange:#d29922;--user-bubble:#1f3a5f;
  --ai-bubble:#1a1e2e;--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}

/* Layout */
.app{display:grid;grid-template-columns:280px 1fr 300px;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{display:flex;flex-direction:column;overflow:hidden}
.panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

/* Sidebar */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-header h2{font-size:14px;color:var(--accent);flex:1}
.logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#fff}
.btn-new{background:var(--accent);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600}
.btn-new:hover{opacity:0.85}
.convo-list{flex:1;overflow-y:auto;padding:8px}
.convo-item{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:2px;font-size:13px;color:var(--text-dim);transition:background 0.15s}
.convo-item:hover,.convo-item.active{background:var(--surface2);color:var(--text)}
.convo-item .actions{margin-left:auto;display:flex;gap:2px;align-items:center}
.convo-item .del,.convo-item .export{opacity:0;font-size:16px;padding:0 4px;background:transparent;color:var(--text-dim)}
.convo-item .del{color:var(--red)}
.convo-item .export{color:var(--accent);font-size:12px;font-weight:600}
.convo-item:hover .del,.convo-item:hover .export{opacity:0.7}
.convo-item .del:hover,.convo-item .export:hover{opacity:1}
.convo-item .msg-count{font-size:10px;color:var(--text-dim);background:var(--surface);padding:1px 6px;border-radius:4px;margin-left:4px;white-space:nowrap}

/* Usage stats panel */
.usage-stats-panel{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.usage-stats-panel h4{font-size:11px;color:var(--accent);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.usage-stat-row{display:flex;justify-content:space-between;padding:3px 0}
.usage-stat-row span:last-child{color:var(--text);font-weight:600}

/* User bar */
.user-bar{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.user-bar .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* Main chat area */
.chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-header h3{font-size:15px;flex:1}
.badge{background:var(--accent2);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:10px;max-width:80%;animation:fadeIn 0.25s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg.user .msg-avatar{background:var(--accent);color:#fff}
.msg.assistant .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg-bubble{padding:12px 16px;border-radius:var(--radius);font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--user-bubble);border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--ai-bubble);border:1px solid var(--border);border-bottom-left-radius:4px}
.typing{color:var(--text-dim);font-style:italic;font-size:13px;padding:0 16px}

/* Input */
.input-area{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:var(--radius);resize:none;min-height:44px;max-height:150px;outline:none;font-size:14px}
.input-area textarea:focus{border-color:var(--accent)}
.btn-send{background:var(--accent);color:#fff;padding:12px 20px;border-radius:var(--radius);font-weight:600;font-size:14px;white-space:nowrap}
.btn-send:hover{opacity:0.85}
.btn-send:disabled{opacity:0.4;cursor:not-allowed}

/* Right panel */
.panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.panel-tab{flex:1;padding:12px 8px;text-align:center;font-size:12px;font-weight:600;color:var(--text-dim);background:transparent;border-bottom:2px solid transparent;transition:all 0.15s}
.panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.panel-tab:hover{color:var(--text)}
.panel-content{flex:1;overflow-y:auto;padding:12px}

/* Prompts */
.prompt-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.prompt-card:hover{border-color:var(--accent)}
.prompt-card h4{font-size:13px;margin-bottom:4px;color:var(--text)}
.prompt-card p{font-size:11px;color:var(--text-dim);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prompt-card .meta{display:flex;gap:8px;margin-top:6px;font-size:10px;color:var(--text-dim)}
.prompt-cat{background:var(--accent2);color:#fff;padding:1px 6px;border-radius:4px;font-size:10px}

/* Analysis tools */
.tool-section{margin-bottom:16px}
.tool-section label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:6px}
.tool-section textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;resize:vertical;min-height:70px;font-size:13px;outline:none}
.tool-section textarea:focus{border-color:var(--accent)}
.tool-section select,.tool-section input[type=text]{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;outline:none;margin-bottom:6px}
.btn-tool{background:var(--accent);color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;width:100%;margin-top:6px}
.btn-tool:hover{opacity:0.85}
.tool-result{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:12px;color:var(--text-dim);white-space:pre-wrap;max-height:200px;overflow-y:auto}

/* Stats bar */
.stats{display:flex;gap:16px;padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text-dim)}
.stat-item{display:flex;align-items:center;gap:4px}
.stat-item span{color:var(--accent);font-weight:600}

/* Login overlay */
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:380px;text-align:center}
.login-box h2{margin-bottom:6px;color:var(--accent);font-size:22px}
.login-box p{color:var(--text-dim);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:10px;font-size:14px;margin-bottom:12px;outline:none}
.login-box input:focus{border-color:var(--accent)}
.login-box .btn-login{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:12px;border-radius:10px;font-size:15px;font-weight:600;width:100%;margin-top:4px}
.login-box .error{color:var(--red);font-size:12px;margin-top:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-dim)}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div style="margin-bottom:16px"><div class="logo" style="width:48px;height:48px;font-size:24px;margin:0 auto;border-radius:14px">NB</div></div>
    <h2>Neural Brain</h2>
    <p>AI Processing Backend - Sign in to continue</p>
    <input type="text" id="loginUser" placeholder="Username" value="demo" autocomplete="off">
    <input type="password" id="loginPass" placeholder="Password" value="demo123">
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="error" id="loginError"></div>
  </div>
</div>

<!-- App -->
<div class="app" id="appContainer" style="display:none">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">NB</div>
      <h2>Neural Brain</h2>
      <button class="btn-new" onclick="createConversation()">+ New</button>
    </div>
    <div class="convo-list" id="convoList"></div>
    <div class="usage-stats-panel" id="usageStatsPanel" style="display:none">
      <h4>Usage Stats</h4>
      <div class="usage-stat-row"><span>Total Messages</span><span id="usageMsgs">0</span></div>
      <div class="usage-stat-row"><span>Total Conversations</span><span id="usageConvos">0</span></div>
    </div>
    <div class="user-bar">
      <div class="dot"></div>
      <span id="currentUser">-</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="chat-header">
      <h3 id="chatTitle">Select a conversation</h3>
      <span class="badge">Neural Brain v1</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="chatInput" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">Send</button>
    </div>
    <div class="stats" id="statsBar">
      <div class="stat-item">Messages: <span id="statMsgs">0</span></div>
      <div class="stat-item">Tokens: <span id="statTokens">0</span></div>
      <div class="stat-item">Conversations: <span id="statConvos">0</span></div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="panel">
    <div class="panel-tabs">
      <button class="panel-tab active" data-tab="prompts" onclick="switchTab(this)">Prompts</button>
      <button class="panel-tab" data-tab="analysis" onclick="switchTab(this)">Analysis</button>
    </div>

    <!-- Prompts panel -->
    <div class="panel-content" id="panelPrompts">
      <div style="margin-bottom:10px">
        <button class="btn-tool" onclick="showAddPrompt()" style="background:var(--accent2)">+ Save New Prompt</button>
      </div>
      <div id="addPromptForm" style="display:none;margin-bottom:12px">
        <input type="text" id="promptTitle" placeholder="Prompt title" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px;margin-bottom:6px;outline:none">
        <textarea id="promptContent" placeholder="Prompt content..." style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px;min-height:60px;resize:vertical;outline:none;margin-bottom:6px"></textarea>
        <select id="promptCategory" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px;outline:none;margin-bottom:6px">
          <option value="general">General</option>
          <option value="development">Development</option>
          <option value="writing">Writing</option>
          <option value="education">Education</option>
        </select>
        <button class="btn-tool" onclick="savePrompt()">Save Prompt</button>
      </div>
      <div id="promptsList"></div>
    </div>

    <!-- Analysis panel -->
    <div class="panel-content" id="panelAnalysis" style="display:none">
      <div class="tool-section">
        <label>Summarize Text</label>
        <textarea id="summarizeInput" placeholder="Paste text to summarize..."></textarea>
        <button class="btn-tool" onclick="doSummarize()">Summarize</button>
        <div class="tool-result" id="summarizeResult" style="display:none"></div>
      </div>
      <div class="tool-section">
        <label>Translate</label>
        <textarea id="translateInput" placeholder="Text to translate..."></textarea>
        <input type="text" id="translateLang" placeholder="Target language (e.g. Spanish)">
        <button class="btn-tool" onclick="doTranslate()">Translate</button>
        <div class="tool-result" id="translateResult" style="display:none"></div>
      </div>
      <div class="tool-section">
        <label>Sentiment Analysis</label>
        <textarea id="sentimentInput" placeholder="Text to analyze..."></textarea>
        <button class="btn-tool" onclick="doSentiment()">Analyze Sentiment</button>
        <div class="tool-result" id="sentimentResult" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let token = null;
let currentConvo = null;
let conversations = [];

// ---- API helpers ----
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ---- Auth ----
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  try {
    const data = await api('POST', '/auth/login', { username: u, password: p });
    token = data.token;
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('appContainer').style.display = 'grid';
    document.getElementById('currentUser').textContent = data.user.username;
    loadConversations();
    loadPrompts();
    loadStats();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
  }
}

// ---- Conversations ----
async function loadConversations() {
  try {
    const data = await api('GET', '/conversations');
    conversations = data.conversations;
    // Fetch message counts for each conversation
    for (const c of conversations) {
      try {
        const msgData = await api('GET', `/conversations/${c.id}/messages`);
        c._messageCount = msgData.messages.length;
      } catch (_e) { c._messageCount = 0; }
    }
    renderConvoList();
  } catch (e) { console.error(e); }
}

function renderConvoList() {
  const el = document.getElementById('convoList');
  el.innerHTML = conversations.map(c => `
    <div class="convo-item ${currentConvo && currentConvo.id === c.id ? 'active' : ''}" onclick="selectConvo(${c.id})">
      <span style="opacity:0.5">&#128172;</span> ${esc(c.title)}
      <span class="msg-count">${c._messageCount || 0} msgs</span>
      <span class="actions">
        <button class="export" onclick="event.stopPropagation();exportConvo(${c.id})" title="Export as JSON">&#8615;</button>
        <span class="del" onclick="event.stopPropagation();deleteConvo(${c.id})">&times;</span>
      </span>
    </div>
  `).join('');
}

async function createConversation() {
  const title = prompt('Conversation title:', 'New Chat');
  if (!title) return;
  try {
    const data = await api('POST', '/conversations', { title });
    await loadConversations();
    selectConvo(data.conversation.id);
  } catch (e) { alert(e.message); }
}

async function selectConvo(id) {
  currentConvo = conversations.find(c => c.id === id);
  if (!currentConvo) return;
  document.getElementById('chatTitle').textContent = currentConvo.title;
  renderConvoList();
  try {
    const data = await api('GET', `/conversations/${id}/messages`);
    renderMessages(data.messages);
  } catch (e) { console.error(e); }
}

async function exportConvo(id) {
  try {
    const res = await fetch(API + `/conversations/${id}/export`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!res.ok) throw new Error('Export failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `conversation-${id}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) { alert('Export failed: ' + e.message); }
}

async function deleteConvo(id) {
  if (!confirm('Delete this conversation?')) return;
  try {
    await api('DELETE', `/conversations/${id}`);
    if (currentConvo && currentConvo.id === id) { currentConvo = null; document.getElementById('messages').innerHTML = ''; document.getElementById('chatTitle').textContent = 'Select a conversation'; }
    await loadConversations();
  } catch (e) { alert(e.message); }
}

// ---- Messages ----
function renderMessages(msgs) {
  const el = document.getElementById('messages');
  el.innerHTML = msgs.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-avatar">${m.role === 'user' ? 'U' : 'AI'}</div>
      <div class="msg-bubble">${esc(m.content)}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

function addMessage(role, content) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="msg-avatar">${role === 'user' ? 'U' : 'AI'}</div><div class="msg-bubble">${esc(content)}</div>`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  if (!currentConvo) { alert('Select or create a conversation first.'); return; }
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMessage('user', msg);
  document.getElementById('btnSend').disabled = true;

  try {
    const data = await api('POST', '/chat', { conversation_id: currentConvo.id, message: msg });
    addMessage('assistant', data.reply);
    loadStats();
  } catch (e) {
    addMessage('assistant', 'Error: ' + e.message);
  }
  document.getElementById('btnSend').disabled = false;
  input.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ---- Prompts ----
async function loadPrompts() {
  try {
    const data = await api('GET', '/prompts');
    renderPrompts(data.prompts);
  } catch (e) { console.error(e); }
}

function renderPrompts(prompts) {
  document.getElementById('promptsList').innerHTML = prompts.map(p => `
    <div class="prompt-card" onclick="usePrompt(${p.id}, '${esc(p.content).replace(/'/g, "\\'")}')">
      <h4>${esc(p.title)}</h4>
      <p>${esc(p.content)}</p>
      <div class="meta"><span class="prompt-cat">${esc(p.category)}</span><span>Used ${p.usage_count}x</span></div>
    </div>
  `).join('');
}

async function usePrompt(id, content) {
  document.getElementById('chatInput').value = content;
  document.getElementById('chatInput').focus();
  try { await api('POST', `/prompts/${id}/use`); loadPrompts(); } catch (_e) {}
}

function showAddPrompt() {
  const f = document.getElementById('addPromptForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

async function savePrompt() {
  const title = document.getElementById('promptTitle').value.trim();
  const content = document.getElementById('promptContent').value.trim();
  const category = document.getElementById('promptCategory').value;
  if (!title || !content) return alert('Title and content are required');
  try {
    await api('POST', '/prompts', { title, content, category });
    document.getElementById('promptTitle').value = '';
    document.getElementById('promptContent').value = '';
    document.getElementById('addPromptForm').style.display = 'none';
    loadPrompts();
  } catch (e) { alert(e.message); }
}

// ---- Analysis ----
async function doSummarize() {
  const text = document.getElementById('summarizeInput').value.trim();
  if (!text) return;
  const el = document.getElementById('summarizeResult');
  el.style.display = 'block'; el.textContent = 'Summarizing...';
  try {
    const data = await api('POST', '/analyze/summarize', { text });
    el.textContent = data.summary + '\n\n(Tokens: ' + data.tokens_used + ')';
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function doTranslate() {
  const text = document.getElementById('translateInput').value.trim();
  const lang = document.getElementById('translateLang').value.trim();
  if (!text || !lang) return;
  const el = document.getElementById('translateResult');
  el.style.display = 'block'; el.textContent = 'Translating...';
  try {
    const data = await api('POST', '/analyze/translate', { text, target_language: lang });
    el.textContent = data.translation;
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

async function doSentiment() {
  const text = document.getElementById('sentimentInput').value.trim();
  if (!text) return;
  const el = document.getElementById('sentimentResult');
  el.style.display = 'block'; el.textContent = 'Analyzing...';
  try {
    const data = await api('POST', '/analyze/sentiment', { text });
    el.textContent = `Sentiment: ${data.sentiment}\nConfidence: ${(data.confidence * 100).toFixed(0)}%\nScore: ${data.score}\nPositive words: ${data.positive_words}\nNegative words: ${data.negative_words}`;
  } catch (e) { el.textContent = 'Error: ' + e.message; }
}

// ---- Stats ----
async function loadStats() {
  try {
    const data = await api('GET', '/usage/stats');
    document.getElementById('statMsgs').textContent = data.total_messages;
    document.getElementById('statTokens').textContent = data.total_tokens;
    document.getElementById('statConvos').textContent = data.conversations;
    // Update sidebar usage stats panel
    document.getElementById('usageStatsPanel').style.display = 'block';
    document.getElementById('usageMsgs').textContent = data.total_messages;
    document.getElementById('usageConvos').textContent = data.conversations;
  } catch (_e) {}
}

// ---- Panel tabs ----
function switchTab(btn) {
  document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panelPrompts').style.display = btn.dataset.tab === 'prompts' ? 'block' : 'none';
  document.getElementById('panelAnalysis').style.display = btn.dataset.tab === 'analysis' ? 'block' : 'none';
}

// ---- Helpers ----
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Auto-login on Enter
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
